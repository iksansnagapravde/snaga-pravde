<!DOCTYPE html>
<html lang="sr-Cyrl-RS">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Контакт — Иксан • Снага правде</title>

<link rel="icon" href="logo-white.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--blue:#0a3f78;
--orange:#ff5a1f;
--text:#111;
--line:rgba(0,0,0,0.12);
--green:#25D366;
}

*{box-sizing:border-box;margin:0;padding:0}
a{text-decoration:none;color:inherit}

body{
font-family:"Playfair Display",serif;
color:var(--text);
background:url('lady-justice-hero.webp') center top / cover no-repeat fixed;
padding-bottom:140px;
}

/* HEADER */
header{
position:sticky;
top:0;
background:#fff;
border-bottom:1px solid var(--line);
z-index:1000;
}

.head{
max-width:1150px;
margin:auto;
padding:12px 0;
display:flex;
align-items:center;
justify-content:space-between;
}

/* LOGO */
.brand{
display:flex;
align-items:center;
gap:12px;
padding-left:12px;
}

.logo-box{
width:72px;
height:72px;
background:var(--blue);
display:flex;
align-items:center;
justify-content:center;
}

.logo-box img{
width:66px;
}

/* TEXT */
.brand-text .top{
font-size:0.6rem;
color:#777;
}

.brand-text .main{
font-size:0.78rem;
font-weight:600;
white-space:nowrap;
}

/* RIGHT */
.nav-right{
display:flex;
align-items:center;
gap:15px;
padding-right:12px;
}

.donate-btn{
background:var(--orange);
color:#fff;
padding:10px 16px;
font-size:0.75rem;
font-weight:700;
}

/* MENU */
.menu{position:relative}

.menu-btn{
width:26px;
height:18px;
display:flex;
flex-direction:column;
justify-content:space-between;
cursor:pointer;
}

.menu-btn span{
height:2px;
background:#000;
}

.dropdown{
position:absolute;
top:calc(100% + 10px);
right:0;
background:#fff;
border:1px solid var(--line);
display:none;
min-width:260px;
}

.menu.open .dropdown{display:block}

/* HERO */
.hero-space{
height:260px;
}

/* BUTTONS */
.top-buttons{
display:flex;
flex-direction:column;
align-items:center;
gap:14px;
margin-top:-80px;
}

.btn-lite{
background:#fff;
border:1px solid rgba(10,63,120,0.25);
padding:12px 24px;
font-size:0.85rem;
color:#0a3f78;
font-weight:600;
}

.btn-main{
background:var(--blue);
color:#fff;
padding:16px 30px;
font-size:0.95rem;
font-weight:700;
}

/* CARDS */
.container{
max-width:1150px;
margin:auto;
padding:20px;
}

.main-grid{
display:grid;
gap:20px;
margin-top:30px;
}

@media(min-width:900px){
.main-grid{grid-template-columns:1fr 1fr;}
}

.doc-card{
padding:26px;
background:#fff;
border:1px solid var(--line);
}

.doc-card.blue{
background:var(--blue);
color:#fff;
}

/* 🔥 SOCIAL — FIXED */
.social-bar{
position:fixed;
right:-80px;
bottom:120px;
display:flex;
flex-direction:column;
gap:12px;
z-index:9999;
transition:0.6s;
opacity:0;
}

.social-bar.show{
right:12px;
opacity:1;
}

.social-bar a{
width:44px;
height:44px;
display:flex;
align-items:center;
justify-content:center;
background:#fff;
border:1px solid var(--line);
}

.social-bar img{
width:20px;
}

/* 🔥 WHATSAPP — ODVOJEN */
.wa-btn{
position:fixed;
right:-200px;
bottom:50px;

display:flex;
align-items:center;
gap:10px;

padding:12px 18px;

background:#25D366;
color:#fff;

font-size:0.85rem;
font-weight:600;

border-radius:40px;

box-shadow:0 10px 25px rgba(37,211,102,0.4);

transition:0.6s;
z-index:10000;
}

.wa-btn.show{
right:12px;
}

.wa-btn img{
width:22px;
filter:brightness(0) invert(1);
}

</style>
</head>

<body>

</div>

<div class="main">Иксан Снага правде</div>
</div>
</div>

<div class="nav-right">

<a href="prijavi.html">Представка</a>
</div>
</div>

</div>
</div>

<div class="hero-space"></div>

<div class="top-buttons">

<a href="prijavi.html" class="btn-main">ПРЕДСТАВКА ГРАЂАНИНА</a>
</div>

<div class="container">
<div class="main-grid">

<div class="doc-card">
<h2>Контакт и подршка</h2>
<p>„Пишите нам“ у доњем углу.</p>
<p>Проблем: путем представке.</p>
<p>066-585-7-707</p>
</div>

<div class="doc-card blue">
<h3>Основни подаци</h3>
<p>Београд</p>
<p>Војводе Степе 127</p>
</div>

</div>
</div>

<!-- SOCIAL -->
<div class="social-bar" id="socialBar">
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg"></a>
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg"></a>
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg"></a>
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg"></a>
</div>

<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
Пишите нам
</a>

<script>

const menu=document.getElementById('menu');
menu.querySelector('.menu-btn').onclick=()=>menu.classList.toggle('open');

window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("socialBar").classList.add("show");
document.querySelector(".wa-btn").classList.add("show");
},400);
});

</script>

</body>
</html>
