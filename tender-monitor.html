<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<title>Tender Monitor</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f7fb;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-left: 5px solid #0a3f78;
}

h2 { margin: 0 0 5px 0; }
p { margin: 4px 0; }

.bad { border-left: 5px solid red !important; }
.warn { border-left: 5px solid orange !important; }
.ok { border-left: 5px solid #0a3f78 !important; }
</style>
</head>

<body>

<h1>📊 Tender Monitor</h1>

<div id="stats" class="card">Учитавање...</div>
<div id="loss" class="card">Учитавање...</div>

<script>

// =======================
// STATS
// =======================
fetch("stats.json?" + Date.now())
.then(r => r.json())
.then(s => {

  document.getElementById("stats").innerHTML = `
    <h2>📈 Статистика</h2>
    <p><b>Број тендера:</b> ${s.broj_tendera}</p>
    <p><b>Укупна вредност:</b> ${s.ukupna_vrednost}</p>
    <p><b>Укупна вредност (EUR):</b> ${s.ukupna_vrednost_eur}</p>
    <p><b>Број уговора:</b> ${s.broj_ugovora}</p>
    <p><b>Уговорена вредност:</b> ${s.ugovorena_vrednost}</p>
  `;

});

// =======================
// LOSS
// =======================
fetch("loss-data.json?" + Date.now())
.then(r => r.json())
.then(l => {

  const div = document.getElementById("loss");

  // 🔴 boja kartice
  if (parseNumber(l.gubitak_prema_najboljoj) > 1000000) {
    div.classList.add("bad");
  } else if (parseNumber(l.gubitak_prema_najboljoj) > 0) {
    div.classList.add("warn");
  } else {
    div.classList.add("ok");
  }

  div.innerHTML = `
    <h2>⚠ Анализа губитака</h2>

    <p><b>Најбоља понуда:</b> ${l.najbolja_ponuda}</p>
    <p><b>Средња понуда:</b> ${l.srednja_ponuda}</p>
    <p><b>Прихваћена понуда:</b> ${l.prihvacena_ponuda}</p>

    <p><b>Губитак (од најбоље):</b> ${l.gubitak_prema_najboljoj}</p>
    <p><b>Губитак (од средње):</b> ${l.gubitak_prema_srednjoj}</p>

    <p><b>Број анализираних:</b> ${l.broj_analiziranih}</p>
  `;

});

// =======================
// helper za broj
// =======================
function parseNumber(x){
  if (!x) return 0;
  return parseInt(x.toString().replace(/[^\d]/g, "")) || 0;
}

</script>

</body>
</html>
