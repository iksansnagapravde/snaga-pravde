name: Tender Monitor Import

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: tender-import
  cancel-in-progress: true

jobs:
  import:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      # 🔥 OCR dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr

      # 🔥 PLAYWRIGHT dependencies (KLJUČNO)
      - name: Install Playwright system deps
        run: |
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libxss1 libasound2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 🔥 Python packages
      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install playwright pdf2image pytesseract

      # 🔥 Instalacija browsera
      - name: Install Playwright browsers
        run: playwright install

      # RUN
      - name: Run script
        run: python full_import.py

      # SAVE
      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add tenders.json contracts.db

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update tenders"
            git push
          fi
