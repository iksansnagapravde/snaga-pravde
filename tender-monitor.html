<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<title>Tender Monitor</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f7fb;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-left: 5px solid #0a3f78;
}

.bad { border-left: 5px solid red; }
.warn { border-left: 5px solid orange; }
.ok { border-left: 5px solid #0a3f78; }

h2 { margin: 0 0 5px 0; }
p { margin: 4px 0; }
</style>
</head>

<body>

<h1>📊 Tender Monitor</h1>

<div id="stats" class="card">Учитавање...</div>
<div id="loss" class="card">Учитавање...</div>

<h2>📄 Lista tendera</h2>
<div id="list"></div>

<h2>🏆 Rang firmi</h2>
<div id="ranking"></div>

<script>

// =======================
// FORMAT
// =======================
function format(x){
  if (!x) return "-";
  return Number(x).toLocaleString("sr-RS") + " RSD";
}

function parseNumber(x){
  return parseInt(x?.toString().replace(/[^\d]/g,"")) || 0;
}

// =======================
// STATS
// =======================
fetch("stats.json?" + Date.now())
.then(r => r.json())
.then(s => {
  document.getElementById("stats").innerHTML = `
    <h2>📈 Statistika</h2>
    <p><b>Broj tendera:</b> ${s.broj_tendera}</p>
    <p><b>Ukupna vrednost:</b> ${s.ukupna_vrednost}</p>
  `;
});

// =======================
// LOSS
// =======================
fetch("loss-data.json?" + Date.now())
.then(r => r.json())
.then(l => {

  const div = document.getElementById("loss");

  if (parseNumber(l.gubitak_prema_najboljoj) > 1000000) {
    div.classList.add("bad");
  } else if (parseNumber(l.gubitak_prema_najboljoj) > 0) {
    div.classList.add("warn");
  }

  div.innerHTML = `
    <h2>⚠ Gubici</h2>
    <p>Gubitak: ${l.gubitak_prema_najboljoj}</p>
  `;
});

// =======================
// TENDERS
// =======================
fetch("tenders.json?" + Date.now())
.then(r => r.json())
.then(data => {

  const list = document.getElementById("list");
  const rankingMap = {};

  data.forEach(t => {

    const div = document.createElement("div");
    div.className = "card";

    if (t.suspicious) {
      div.classList.add("bad");
    }

    div.innerHTML = `
      <h2>${t.winner || "Nepoznato"}</h2>

      <p><b>Prihvaćena:</b> ${format(t.accepted)}</p>
      <p><b>Najniža:</b> ${format(t.lowest)}</p>
      <p><b>Razlika:</b> ${format(t.difference)}</p>

      <p><b>Status:</b> ${t.status}</p>
    `;

    list.appendChild(div);

    // =======================
    // RANKING
    // =======================
    if (t.winner) {
      if (!rankingMap[t.winner]) {
        rankingMap[t.winner] = {
          count: 0,
          total: 0
        };
      }

      rankingMap[t.winner].count += 1;
      rankingMap[t.winner].total += t.accepted || 0;
    }

  });

  // =======================
  // RENDER RANKING
  // =======================
  const ranking = Object.entries(rankingMap)
    .sort((a,b) => b[1].total - a[1].total);

  const rankingDiv = document.getElementById("ranking");

  ranking.forEach(([name, val], i) => {
    const d = document.createElement("div");
    d.className = "card";

    d.innerHTML = `
      <b>#${i+1} ${name}</b><br>
      Ugovori: ${val.count}<br>
      Vrednost: ${format(val.total)}
    `;

    rankingDiv.appendChild(d);
  });

});

</script>

</body>
</html>
