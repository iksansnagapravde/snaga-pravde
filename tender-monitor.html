<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<title>Tender Monitor</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f7fb;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-left: 5px solid #0a3f78;
}

.risk-high { border-color: red; }
.risk-mid { border-color: orange; }
.risk-low { border-color: green; }

h2 { margin: 0 0 5px 0; }
p { margin: 2px 0; }
</style>
</head>

<body>

<h1>📊 Tender Monitor (LIVE)</h1>

<div id="list">Учитавање...</div>

<script>
fetch("tenders.json?" + Date.now())
.then(r => {
  if (!r.ok) throw new Error("Greška u učitavanju");
  return r.json();
})
.then(data => {

  const list = document.getElementById("list");
  list.innerHTML = "";

  // ✅ zaštita ako nema podataka
  if (!Array.isArray(data) || data.length === 0) {
    list.innerHTML = "Нема података";
    return;
  }

  data.forEach(t => {

    let risk = t.risk || 0;

    let cls = "risk-low";
    if (risk >= 5) cls = "risk-high";
    else if (risk >= 3) cls = "risk-mid";

    const div = document.createElement("div");
    div.className = "card " + cls;

    div.innerHTML = `
      <h2>${t.subject || "Без назива"}</h2>
      <p><b>Победник:</b> ${t.winner || "-"}</p>
      <p>Најнижа: ${format(t.lowest)}</p>
      <p>Медијана: ${format(t.median)}</p>
      <p>Прихваћена: ${format(t.accepted)}</p>
      <p><b>Ризик:</b> ${risk}</p>
    `;

    list.appendChild(div);
  });

})
.catch(err => {
  document.getElementById("list").innerHTML = "Грешка или нема података.";
  console.log(err);
});

// ✅ stabilna format funkcija
function format(x){
  if (x === null || x === undefined) return "-";
  return Number(x).toLocaleString("sr-RS") + " RSD";
}
</script>

</body>
</html>
