<!DOCTYPE html>
<html lang="sr-Cyrl-RS">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Контакт — Иксан • Снага правде</title>

<link rel="icon" href="logo-white.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
--gold:#c6a25a;
--text:#1f1f1f;
--soft:#6a6a6a;
--border:rgba(0,0,0,0.1);
--blue:#0d3b66;
}

*{box-sizing:border-box;margin:0;padding:0}
a{text-decoration:none;color:inherit}

body{
background:url('lady-justice-hero.webp') center 20% / cover no-repeat fixed;
font-family:"Playfair Display",serif;
color:var(--text);
padding-bottom:140px;
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:100;
background:#fff;
border-bottom:1px solid var(--border);
}

.head{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 20px;
max-width:1150px;
margin:auto;
}

/* LOGO (PLAVA KOCKA) */
.brand{
display:flex;
align-items:center;
gap:12px;
}

.logo-box{
width:48px;
height:48px;
background:var(--blue);
display:flex;
align-items:center;
justify-content:center;
border-radius:6px;
}

.logo-box img{
width:28px;
}

/* TEXT */
.brand-text{
display:flex;
flex-direction:column;
line-height:1.1;
}

.brand-text div:first-child{
font-size:0.7rem;
color:#777;
}

.brand-text div:last-child{
font-size:0.9rem;
}

/* RIGHT */
.nav-right{
display:flex;
align-items:center;
gap:15px;
}

.donate-btn{
background:#f26522;
color:#fff;
padding:8px 14px;
font-size:0.75rem;
}

/* MENU */
.menu-btn{
width:26px;
height:18px;
display:flex;
flex-direction:column;
justify-content:space-between;
cursor:pointer;
}

.menu-btn span{
height:2px;
background:#000;
}

/* DROPDOWN */
.menu{position:relative}

.dropdown{
position:absolute;
top:calc(100% + 10px);
right:0;
background:#fff;
border:1px solid var(--border);
padding:10px;
display:none;
min-width:260px;
}

.menu.open .dropdown{display:block}

.dropdown a{
display:block;
padding:10px;
border-bottom:1px solid var(--border);
}

.dropdown a:last-child{
border:none;
}

/* BUTTONS */
.container{max-width:1150px;margin:auto;padding:20px;}

.top-buttons{
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
margin-top:20px;
}

.btn{
padding:10px 18px;
font-size:12px;
border:1px solid var(--border);
background:#fff;
}

.btn-danger{
border-color:#8c1428;
color:#8c1428;
}

/* CARDS */
.main-grid{
display:grid;
gap:25px;
margin-top:30px;
}

@media(min-width:900px){
.main-grid{grid-template-columns:1fr 1fr;}
}

.doc-card{
background:#fff;
padding:30px;
border:1px solid var(--border);
border-radius:6px;
}

/* WHATSAPP (VRACENO) */
.wa-btn{
position:fixed;
bottom:20px;
right:-180px;
display:flex;
align-items:center;
gap:8px;
padding:10px 14px;
border-radius:30px;
font-size:12px;
background:#fff;
border:1px solid var(--border);
transition:0.5s;
}

.wa-btn.show{right:10px;}

.wa-btn img{width:18px;}

/* SOCIAL (VRACENO) */
.social-bar{
position:fixed;
right:-70px;
bottom:110px;
display:flex;
flex-direction:column;
gap:10px;
opacity:0.4;
transition:0.5s;
}

.social-bar.show{
right:10px;
opacity:0.3;
}

.social-bar a{
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:#fff;
border:1px solid var(--border);
}

.social-bar img{
width:18px;
opacity:0.6;
}

</style>
</head>

<body>

<header>
<div class="head">

<div class="brand">

<div class="logo-box">
<img src="logo-white.png">
</div>

<div class="brand-text">
<div>Удружење грађана</div>
<div>Иксан Снага правде</div>
</div>

</div>

<div class="nav-right">

<a href="doniraj.html" class="donate-btn">ДОНИРАЈ</a>

<div class="menu" id="menu">

<div class="menu-btn">
<span></span>
<span></span>
<span></span>
</div>

<div class="dropdown">
<a href="index.html">Почетна</a>
<a href="kontakt.html">Контакт</a>
<a href="onama.html">О нама</a>
<a href="oblasti.html">Области деловања</a>
<a href="ciljevi.html">Циљеви</a>
<a href="inicijative.html">Иницијативе</a>
<a href="prijavi.html">Представка</a>
</div>

</div>

</div>

</div>
</header>

<div class="container">

<div class="top-buttons">
<a href="inicijative.html" class="btn">ЗАКОНИ И ПРОПИСИ</a>
<a href="prijavi.html" class="btn btn-danger">ПРЕДСТАВКА ГРАЂАНИНА</a>
</div>

</div>

<div class="social-bar" id="socialBar">
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg"></a>
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg"></a>
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg"></a>
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg"></a>
</div>

<a href="https://wa.me/381665857707" class="wa-btn">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
Пишите нам
</a>

<script>
const menu=document.getElementById('menu');
menu.querySelector('.menu-btn').onclick=()=>menu.classList.toggle('open');

window.addEventListener("load",()=>{
setTimeout(()=>{
document.querySelector(".wa-btn").classList.add("show");
document.getElementById("socialBar").classList.add("show");
},400);
});
</script>

</body>
</html>
