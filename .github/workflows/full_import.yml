name: Tender Monitor Import

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: tender-import
  cancel-in-progress: true

jobs:
  import:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout repo
        uses: actions/checkout@v4

      # =========================
      # SYSTEM DEPENDENCIES
      # =========================
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr

      # =========================
      # PLAYWRIGHT SYSTEM DEPS (FIXED)
      # =========================
      - name: Install Playwright system deps
        run: |
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libxss1 \
            libasound2t64 \
            libgtk-3-0 \
            libgbm1 \
            libxshmfence1

      # =========================
      # PYTHON
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
        pip install playwright pdf2image pytesseract python-docx openai==0.28

      # =========================
      # PLAYWRIGHT
      # =========================
      - name: Install Playwright browsers
        run: |
          playwright install chromium

      # =========================
      # RUN SCRIPT
      # =========================
      - name: Run script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python full_import.py

      # =========================
      # SAVE RESULTS
      # =========================
      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add stats.json loss-data.json

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update stats"
            git push
          fi
