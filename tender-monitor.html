<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<title>Tender Monitor</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f7fb;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-left: 5px solid #0a3f78;
}

h2 { margin: 0 0 5px 0; }
p { margin: 4px 0; }

.bad { border-left: 5px solid red !important; }
.warn { border-left: 5px solid orange !important; }
.ok { border-left: 5px solid #0a3f78 !important; }
</style>
</head>

<body>

<h1>📊 Tender Monitor</h1>

<div id="list">Учитавање...</div>

<script>
fetch("tenders.json?" + Date.now())
.then(r => {
  if (!r.ok) throw new Error("Greška u učitavanju");
  return r.json();
})
.then(data => {

  const list = document.getElementById("list");
  list.innerHTML = "";

  if (!Array.isArray(data) || data.length === 0) {
    list.innerHTML = "Нема података";
    return;
  }

  data.forEach(t => {

    const div = document.createElement("div");
    div.className = "card";

    // 🔴 logika za boju (VAŽNO)
    if (t.loss_low > 100000) {
      div.classList.add("bad");
    } else if (t.loss_low > 0) {
      div.classList.add("warn");
    } else {
      div.classList.add("ok");
    }

    div.innerHTML = `
      <h2>${t.winner || "Без назива"}</h2>

      <p><b>Прихваћена:</b> ${format(t.accepted)}</p>
      <p><b>Најнижа:</b> ${format(t.lowest)}</p>
      <p><b>Медијана:</b> ${format(t.median)}</p>

      <p><b>Губитак (од најниже):</b> ${format(t.loss_low)}</p>
      <p><b>Губитак (од медијане):</b> ${format(t.loss_median)}</p>
    `;

    list.appendChild(div);
  });

})
.catch(err => {
  document.getElementById("list").innerHTML = "Грешка или нема података.";
  console.log(err);
});

// format broja
function format(x){
  if (x === null || x === undefined) return "-";
  return Number(x).toLocaleString("sr-RS") + " RSD";
}
</script>

</body>
</html>
