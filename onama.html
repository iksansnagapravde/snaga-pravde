<!DOCTYPE html>
<html lang="sr-Cyrl-RS">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>О удружењу — Иксан • Снага правде</title>

<link rel="icon" href="logo-white.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#0a3f78;
  --orange:#ff5a1f;
  --orange-dark:#e44e16;
  --text:#111;
  --line:rgba(0,0,0,0.12);
}

*{box-sizing:border-box;margin:0;padding:0}
a{text-decoration:none;color:inherit}

body{
  font-family:"Playfair Display",serif;
  color:var(--text);
  padding-bottom:140px;
  overflow-x:hidden;
}

/* POZADINA */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:url('lady-justice-hero.webp') center top / cover no-repeat;
  animation:goddessReveal 1.4s ease-out both;
}

@keyframes goddessReveal{
  0%{
    transform:translate(80px,100px) scale(1.08);
    background-position:65% 35%;
    opacity:0.85;
  }
  100%{
    transform:translate(0,0) scale(1);
    background-position:center top;
    opacity:1;
  }
}

/* HEADER */
header{
  position:sticky;
  top:0;
  background:#fff;
  border-bottom:1px solid var(--line);
  z-index:1000;
}

.head{
  max-width:1150px;
  margin:auto;
  padding:12px 0;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  padding-left:12px;
}

.logo-box{
  width:72px;
  height:72px;
  background:var(--blue);
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo-box img{width:66px}

.brand-text .top{font-size:0.6rem;color:#777}
.brand-text .main{font-size:0.78rem;font-weight:600}

/* DONATE */
.donate-btn{
  background:linear-gradient(135deg,var(--orange),var(--orange-dark));
  color:#fff;
  padding:10px 24px;
  min-width:165px;
  text-align:center;
  font-size:0.78rem;
  font-weight:700;
}

/* MENU */
.menu{position:relative}
.menu-btn{
  width:26px;
  height:18px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
}
.menu-btn span{height:2px;background:#000}

.dropdown{
  position:absolute;
  top:calc(100% + 10px);
  right:0;
  background:#fff;
  border:1px solid var(--line);
  display:none;
  min-width:270px;
}

.menu.open .dropdown{display:block}

.dropdown a{
  display:block;
  padding:10px 14px;
  font-size:0.85rem;
  border-bottom:1px solid var(--line);
}

.container{
  max-width:1150px;
  margin:auto;
  padding:20px;
}

/* HERO */
.hero{
  background:#fff;
  padding:26px;
  margin-top:30px;
  border:1px solid var(--line);
}

.hero h1{font-size:1.3rem;margin-bottom:10px}
.hero p{font-size:0.9rem;line-height:1.6}

/* KPI */
.kpi-grid{
  display:grid;
  gap:15px;
  margin-top:20px;
}
@media(min-width:900px){
  .kpi-grid{grid-template-columns:repeat(5,1fr);}
}

.kpi-card{
  background:#fff;
  padding:15px;
  border:1px solid var(--line);
  text-align:center;
}

.kpi-card strong{font-size:1rem;color:var(--blue)}
.kpi-card span{font-size:0.8rem}

/* CARDS */
.cards-grid{
  display:grid;
  gap:20px;
  margin-top:25px;
}
@media(min-width:900px){
  .cards-grid{grid-template-columns:1fr 1fr;}
}

.card{
  background:#fff;
  padding:22px;
  border:1px solid var(--line);
}

.card h3{font-size:0.95rem;margin-bottom:8px}
.card p{font-size:0.85rem;line-height:1.6}

/* SECTION */
.section-card{
  margin-top:30px;
  background:#fff;
  padding:22px;
  border:1px solid var(--line);
}

.section-card h2{font-size:1.1rem;margin-bottom:10px}

/* CHART */
.chart-wrap{height:260px;margin-top:15px}

/* SOCIAL */
.social-bar{
  position:fixed;
  right:-80px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:9999;
  transition:.6s;
}
.social-bar.show{right:12px}

.social-bar a{
  width:44px;
  height:44px;
  background:#fff;
  border:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
}

.social-bar img{width:20px}

/* WHATSAPP */
.wa-btn{
  position:fixed;
  right:-220px;
  bottom:50px;
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 18px;
  background:#25D366;
  color:#fff;
  border-radius:40px;
  transition:.6s;
}
.wa-btn.show{right:12px}
.wa-btn img{width:22px;filter:invert(1)}
</style>
</head>

<body>

<header>
<div class="head">

<div class="brand">

<img src="logo-white.png">
</div>

<a href="ciljevi.html">Стратешки циљеви</a>
<a href="inicijative.html">Захтеви</a>
</div>
</div>
</div>

</div>
</header>

<div class="container">

<section class="hero">
<h1>О УДРУЖЕЊУ ИКСАН</h1>
<p>Удружење грађана Иксан – Снага правде...</p>
</section>

<!-- KPI -->
<div class="kpi-grid">
<div class="kpi-card"><strong>22.000+</strong><span>чланова</span></div>
<div class="kpi-card"><strong>10.000+</strong><span>мејлова</span></div>

<!-- CHART -->

<div class="chart-wrap">
<canvas id="membersChart"></canvas>
</div>
</section>

</div>

<!-- SOCIAL -->
<div class="social-bar" id="socialBar">
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg"></a>
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg"></a>
</div>

<a href="https://wa.me/381665857707" class="wa-btn">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
Пишите нам
</a>

<script>
const menu=document.getElementById('menu');
menu.querySelector('.menu-btn').onclick=()=>menu.classList.toggle('open');

window.addEventListener("load",()=>{
setTimeout(()=>{
document.querySelector(".wa-btn").classList.add("show");
document.getElementById("socialBar").classList.add("show");
},400);
});
</script>

</body>
</html>
