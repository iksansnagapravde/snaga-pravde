<!DOCTYPE html>

<style>

:root{
--deepBlue:#1f1f1f;
--gold:#d3a451;
--ink:#dcdcdc;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
min-height:100vh;
background:url('justice-bg.jpg') center 25% / cover no-repeat fixed;
color:#fff;
font-family:"Times New Roman",serif;
line-height:1.7;
}

a{text-decoration:none;color:inherit}

.container{max-width:1150px;margin:0 auto;padding:0 20px}

/* HEADER */
header{
position:sticky;
top:0;
z-index:100;
backdrop-filter:blur(6px);
border-bottom:1px solid rgba(255,255,255,.1);
}

.head{
display:flex;
justify-content:space-between;
align-items:center;
padding:4px 0;
}

.brand img{height:140px;border-radius:10px}

/* NAV */
.nav{display:flex;gap:8px}

.nav a,.menu-btn{
padding:6px 10px;
border-radius:10px;
font-weight:600;
background:rgba(0,0,0,0.45);

box-shadow:
0 5px 0 rgba(0,0,0,.7),
0 15px 30px rgba(0,0,0,.8);
}

.menu-btn{
background:#fff;
color:#000;
}

.menu{position:relative}

.dropdown{
position:absolute;
top:100%;
right:0;
background:rgba(20,20,20,.9);
border-radius:12px;
display:none;
padding:6px;
}

.menu.open .dropdown{display:block}

/* HERO */
.hero{
text-align:center;
padding:40px 0;
}

h1{
font-size:28px;
margin-bottom:10px;
}

.sub{
color:var(--ink);
max-width:700px;
margin:auto;
}

/* BUTTONS */
.cta-row{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

.btn{
padding:10px 20px;
border-radius:30px;
font-weight:700;

box-shadow:
0 6px 0 rgba(0,0,0,.6),
0 18px 35px rgba(0,0,0,.8);
}

.btn-dark{background:#222;color:#fff}
.btn-primary{background:var(--gold);color:#000}

/* GRID */
.grid{
display:grid;
gap:25px;
margin-top:30px;
}

@media(min-width:900px){
.grid{grid-template-columns:1fr 1fr;}
}

.card{
background:rgba(0,0,0,0.6);
padding:25px;
border-radius:15px;
}

.card p{color:#ddd}

/* WHATSAPP 3D */
.whatsapp-float{
position:fixed;
bottom:20px;
right:20px;
width:65px;
height:65px;

background:linear-gradient(145deg,#25D366,#1ebe5d);

display:flex;
align-items:center;
justify-content:center;

border-radius:50%;

box-shadow:
0 8px 0 #128C7E,
0 20px 40px rgba(0,0,0,0.8);

cursor:pointer;
z-index:9999;
}

.whatsapp-float:hover{
transform:translateY(-4px);
}

.whatsapp-float:active{
transform:translateY(6px);
}

/* MOBILE */
@media(max-width:768px){

.brand img{height:90px}

.nav{
flex-wrap:wrap;
justify-content:center;
}

.cta-row{
flex-direction:column;
}

.cta-row a{
width:90%;
text-align:center;
}

}

</style>
</head>

<body>

<a href="uradili.html">Шта смо урадили</a>
</div>

</div>

</nav>
</div>
</header>

<main>

<section class="hero">

<h1>Заштита права грађана</h1>

<p class="sub">
Иницијатива за праведнији и одговорнији правни систем.
</p>

<div class="cta-row">
<a href="inicijative.html" class="btn btn-dark">ЗАКОНИ</a>
<a href="prijavi.html" class="btn btn-dark">ПРИЈАВА</a>
<a href="doniraj.html" class="btn btn-primary">ПОДРЖИ</a>

</section>

<div class="container grid">

<div class="card">
<h3>Реформа система</h3>
<p>Јачање правне сигурности и контроле.</p>
</div>

<div class="card">

<p>Контрола јавних финансија и функција.</p>
</div>

</div>

</main>

</html>
