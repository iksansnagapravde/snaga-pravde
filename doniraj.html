<!DOCTYPE html>
<html lang="sr-Cyrl-RS">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Подржи рад — Иксан • Снага правде</title>

<link rel="icon" href="logo-white.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#0a3f78;
  --orange:#ff5a1f;
  --orange-dark:#e44e16;
  --text:#111;
  --line:rgba(0,0,0,0.12);
  --green:#25D366;
  --gold:#d3a451;
}

*{box-sizing:border-box;margin:0;padding:0}
a{text-decoration:none;color:inherit}

body{
  font-family:"Playfair Display",serif;
  color:var(--text);
  padding-bottom:140px;
  overflow-x:hidden;
}

/* POZADINA (БОГИЊА) */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:url('lady-justice-hero.webp') center top / cover no-repeat;
  animation:goddessReveal 1.3s ease-out both;
  transform-origin:bottom right;
}

@keyframes goddessReveal{
  0%{transform:translate(120px,140px) scale(1.1);opacity:0.8;}
  100%{transform:translate(0,0) scale(1);opacity:1;}
}

/* HEADER */
header{
  position:sticky;
  top:0;
  background:#fff;
  border-bottom:1px solid var(--line);
  z-index:1000;
}

.head{
  max-width:1150px;
  margin:auto;
  padding:10px 0;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* LOGO */
.brand{
  display:flex;
  align-items:center;
  gap:12px;
  padding-left:12px;
}

.logo-box{
  width:72px;
  height:72px;
  background:var(--blue);
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo-box img{width:66px;}

.brand-text .top{
  font-size:0.58rem;
  color:#777;
}

.brand-text .main{
  font-size:0.8rem;
  font-weight:600;
  white-space:nowrap;
}

/* DESNO */
.nav-right{
  display:flex;
  align-items:center;
  gap:12px;
  padding-right:12px;
}

/* DONIRAJ */
.donate-btn{
  background:linear-gradient(135deg,var(--orange),var(--orange-dark));
  color:#fff;
  padding:10px 12px;
  min-width:95px;
  text-align:center;
  font-size:0.72rem;
  font-weight:700;
  border:none;
}

/* MENU */
.menu{position:relative}

.menu-btn{
  width:26px;
  height:18px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
}

.menu-btn span{
  height:2px;
  background:#000;
}

.dropdown{
  position:absolute;
  top:calc(100% + 10px);
  right:0;
  background:#fff;
  border:1px solid var(--line);
  display:none;
  min-width:270px;
}

.menu.open .dropdown{display:block}

.dropdown a{
  display:block;
  padding:10px 14px;
  font-size:0.85rem;
  border-bottom:1px solid var(--line);
}

/* HERO SPACE */
.hero-space{height:260px;}

/* BUTTONS */
.top-buttons{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  margin-top:-80px;
}

.btn-lite{
  background:#fff;
  border:1px solid rgba(10,63,120,0.25);
  padding:12px 24px;
  font-size:0.85rem;
  color:#0a3f78;
  font-weight:600;
}

.btn-main{
  background:var(--blue);
  color:#fff;
  padding:16px 30px;
  font-size:0.95rem;
  font-weight:700;
}

/* CONTENT */
.container{
  max-width:1150px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  gap:20px;
  margin-top:30px;
}

/* KARTICE */
.card{
  background:#fff;
  padding:20px;
  border:1px solid var(--line);
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.card.dark{
  background:#0a3f78;
  color:#fff;
}

/* DONATION BOX */
.paypal, .bank{
  max-width:420px;
  margin:auto;
}

.amounts{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  margin-top:10px;
}

.amount-btn{
  padding:10px;
  text-align:center;
  background:#eee;
  cursor:pointer;
}

.amount-btn.active{
  background:var(--gold);
}

/* SOCIAL */
.social-bar{
  position:fixed;
  right:-80px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:12px;
  opacity:0;
  transition:0.6s;
}

.social-bar.show{
  right:12px;
  opacity:1;
}

.social-bar a{
  width:44px;
  height:44px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid var(--line);
}

.social-bar img{width:20px;}

/* WHATSAPP */
.wa-btn{
  position:fixed;
  right:-220px;
  bottom:50px;
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 14px;
  background:#25D366;
  color:#fff;
  border-radius:40px;
  transition:0.6s;
}

.wa-btn.show{right:12px;}
.wa-btn img{width:22px;filter:brightness(0) invert(1);}
</style>
</head>

<body>

<header>
<div class="head">

<div class="brand">
<div class="logo-box">
<img src="logo-white.png">
</div>
<div class="brand-text">
<div class="top">Удружење грађана</div>
<div class="main">Иксан Снага правде</div>
</div>
</div>

<div class="nav-right">
<a href="doniraj.html" class="donate-btn">ДОНИРАЈ</a>

<div class="menu" id="menu">
<div class="menu-btn"><span></span><span></span><span></span></div>
<div class="dropdown">
<a href="index.html">ПОЧЕТНА</a>
<a href="kontakt.html">Контакт</a>
<a href="onama.html">О нама</a>
</div>
</div>

</div>
</div>
</header>

<div class="hero-space"></div>

<div class="top-buttons">
<a href="inicijative.html" class="btn-lite">ЗАКОНИ И ПРОПИСИ</a>
<a href="prijavi.html" class="btn-main">ПРЕДСТАВКА ГРАЂАНИНА</a>
</div>

<div class="container">

<div class="grid">

<div class="card paypal">
<h2>УПЛАТА КАРТИЦОМ</h2>

<div class="amounts">
<div class="amount-btn active" data="10">10€</div>
<div class="amount-btn" data="20">20€</div>
<div class="amount-btn" data="50">50€</div>
<div class="amount-btn" data="100">100€</div>
</div>

<input type="number" placeholder="Унесите износ (€)" id="customAmount">

<button id="donateBtn">ДОНИРАЈ</button>
</div>

<div class="card bank">
<h3>БАНКА</h3>
<p><b>Прималац:</b> ИКСАН</p>
<p><b>Рачун:</b> 340-1000345580-18</p>
</div>

</div>

</div>

<div class="social-bar" id="socialBar">
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg"></a>
</div>

<a href="https://wa.me/381665857707" class="wa-btn">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
Пишите нам
</a>

<script>
const menu=document.getElementById('menu');
menu.querySelector('.menu-btn').onclick=()=>menu.classList.toggle('open');

window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("socialBar").classList.add("show");
document.querySelector(".wa-btn").classList.add("show");
},400);
});
</script>

</body>
</html>
