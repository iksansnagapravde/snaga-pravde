name: Full Import Contracts

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: full-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ==============================
      # CHECKOUT
      # ==============================
      - name: Checkout repo
        uses: actions/checkout@v4

      # ==============================
      # PYTHON
      # ==============================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ==============================
      # CACHE
      # ==============================
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ==============================
      # INSTALL CHROME (SELENIUM AUTO)
      # ==============================
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2

      # 🔥 Selenium će sam uzeti driver (bez konflikta)
      - name: Set Chrome path
        run: echo "CHROME_BIN=$(which google-chrome)" >> $GITHUB_ENV

      # ==============================
      # SYSTEM DEPENDENCIES (OCR)
      # ==============================
      - name: Install Tesseract + Poppler
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr poppler-utils

      # ==============================
      # PYTHON DEPENDENCIES
      # ==============================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ==============================
      # RUN SCRIPT
      # ==============================
      - name: Run full import
        run: python full_import.py

      # ==============================
      # COMMIT RESULTS
      # ==============================
      - name: Commit updated files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add stats.json loss-data.json contracts.db

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update data"
            git push
          fi
