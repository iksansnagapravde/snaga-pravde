<!DOCTYPE html>
<html lang="sr-Cyrl-RS">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Подржи наш рад — Иксан • Снага правде</title>

<link rel="icon" href="logo-white.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#0a3f78;
  --orange:#ff5a1f;
  --orange-dark:#e44e16;
  --text:#111;
  --line:rgba(0,0,0,0.12);
}

*{box-sizing:border-box;margin:0;padding:0}
a{text-decoration:none;color:inherit}

body{
  font-family:"Playfair Display",serif;
  color:var(--text);
  padding-bottom:140px;
  overflow-x:hidden;
}

/* POZADINA */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
  linear-gradient(to bottom, rgba(255,255,255,0.85), rgba(255,255,255,0.92)),
  url('lady-justice-hero.webp') center 10% / cover no-repeat;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  background:#fff;
  border-bottom:1px solid var(--line);
  z-index:1000;
}

.head{
  max-width:1150px;
  margin:auto;
  padding:12px 0;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* LOGO */
.brand{
  display:flex;
  align-items:center;
  gap:12px;
  padding-left:12px;
}

.logo-box{
  width:72px;
  height:72px;
  background:var(--blue);
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo-box img{width:66px;}

.brand-text .top{
  font-size:0.6rem;
  color:#777;
}

.brand-text .main{
  font-size:0.78rem;
  font-weight:600;
}

/* RIGHT */
.nav-right{
  display:flex;
  align-items:center;
  gap:12px;
  padding-right:12px;
}

/* DONATE HEADER */
.donate-btn{
  background:linear-gradient(135deg,var(--orange),var(--orange-dark));
  color:#fff;
  padding:10px 12px;
  min-width:100px;
  text-align:center;
  font-size:0.75rem;
  font-weight:700;
}

/* HERO */
.hero-space{height:150px}

/* CONTAINER */
.container{
  max-width:650px;
  margin:auto;
  padding:20px;
}

/* CARD */
.doc-card{
  padding:26px;
  background:#fff;
  border:1px solid var(--line);
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

/* TITLE */
.doc-card h2{
  text-align:center;
  font-size:24px;
  margin-bottom:15px;
}

/* AMOUNTS */
.amounts{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.amount-btn{
  padding:12px;
  background:#f2f2f2;
  text-align:center;
  cursor:pointer;
  font-weight:600;
}

.amount-btn.active{
  background:var(--blue);
  color:#fff;
}

/* INPUT */
.custom{
  margin-top:12px;
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  text-align:center;
}

/* MAIN DONATE BUTTON (FIX) */
.main-donate{
  margin-top:12px;
  width:100%;
  padding:14px;
  border:none;
  background:linear-gradient(135deg,var(--orange),var(--orange-dark));
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

/* ZIRO CARD */
.bank-card{
  margin-top:20px;
  padding:20px;
  background:#fafafa;
  border:1px solid var(--line);
}

.bank-card h3{
  text-align:center;
  margin-bottom:12px;
}

.bank-row{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid #eee;
  font-size:14px;
}

.bank-row:last-child{
  border:none;
}

.bank-row span:last-child{
  font-weight:600;
}

/* SOCIAL */
.social-bar{
  position:fixed;
  right:12px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.social-bar a{
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
  border:1px solid var(--line);
}

.social-bar img{width:20px;}

/* WHATSAPP */
.wa-btn{
  position:fixed;
  right:12px;
  bottom:50px;
  padding:12px 14px;
  background:#25D366;
  color:#fff;
  border-radius:40px;
}
</style>
</head>

<body>

<header>
<div class="head">

<div class="brand">
<div class="logo-box">
<img src="logo-white.png">
</div>
<div class="brand-text">
<div class="top">Удружење грађана</div>
<div class="main">Иксан Снага правде</div>
</div>
</div>

<div class="nav-right">
<a href="doniraj.html" class="donate-btn">ДОНИРАЈ</a>
</div>

</div>
</header>

<div class="hero-space"></div>

<div class="container">

<div class="doc-card">

<h2>Подржи наш рад</h2>

<div class="amounts">
<div class="amount-btn active" data="10">10€</div>
<div class="amount-btn" data="20">20€</div>
<div class="amount-btn" data="50">50€</div>
<div class="amount-btn" data="100">100€</div>
</div>

<input type="number" id="customAmount" class="custom" placeholder="Унесите износ (€)">

<button class="main-donate" id="donateBtn">
ДОНИРАЈ САДА
</button>

<p style="text-align:center;font-size:12px;margin-top:8px;color:#666;">
Сигурна уплата — PayPal
</p>

</div>

<!-- ZIRO RACUN -->
<div class="bank-card">

<h3>Уплата на жиро рачун</h3>

<div class="bank-row">
<span>Прималац:</span>
<span>Иксан Снага правде</span>
</div>

<div class="bank-row">
<span>Жиро рачун:</span>
<span>340-100034558018</span>
</div>

<div class="bank-row">
<span>Банка:</span>
<span>Erste банка</span>
</div>

<div class="bank-row">
<span>Сврха:</span>
<span>Донација</span>
</div>

<div class="bank-row">
<span>Позив на број:</span>
<span>2026</span>
</div>

</div>

</div>

<div class="social-bar">
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg"></a>
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg"></a>
</div>

<a href="https://wa.me/381665857707" class="wa-btn">
Пишите нам
</a>

<script>
let amount=10;

document.querySelectorAll('.amount-btn').forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll('.amount-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
amount=btn.getAttribute('data');
};
});

document.getElementById('donateBtn').onclick=()=>{
let custom=document.getElementById('customAmount').value;
let finalAmount=custom || amount;
window.open(`https://www.paypal.me/snagapravde/${finalAmount}`,'_blank');
};
</script>

</body>
</html>
