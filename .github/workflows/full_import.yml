name: Full Import Contracts

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

# 🔐 dozvola za push u repo
permissions:
  contents: write

# 🚫 sprečava paralelne run-ove
concurrency:
  group: full-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ===================================================
      # CHECKOUT
      # ===================================================
      - name: Checkout repo
        uses: actions/checkout@v4

      # ===================================================
      # PYTHON
      # ===================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ===================================================
      # CACHE (ubrzava instalaciju)
      # ===================================================
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ===================================================
      # CHROME (za Selenium)
      # ===================================================
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      # ===================================================
      # DEPENDENCIES
      # ===================================================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ===================================================
      # RUN SCRIPT
      # ===================================================
      - name: Run full import
        run: python full_import.py

      # ===================================================
      # COMMIT RESULTS
      # ===================================================
      - name: Commit updated files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add stats.json loss-data.json suspicious-winners.json

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto full import update"
            git push
          fi

      # ===================================================
      # OPTIONAL: Upload DB (bez commit-a)
      # ===================================================
      # - name: Upload DB
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: contracts-db
      #     path: contracts.db
