<style>

/* ===== ORIGINAL ===== */
:root{
--deepBlue:#1f1f1f;
--gold:#d3a451;
--radius:16px;
--ink:#dcdcdc;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
min-height:100vh;
background: url('justice-bg.jpg') center 25% / cover no-repeat fixed;
color:#fff;
font-family:"Times New Roman",serif;
}

/* ===== HEADER ===== */
header{
position:sticky;
top:0;
z-index:100;
backdrop-filter:blur(6px);
border-bottom:1px solid rgba(255,255,255,.1);
}

.head{
display:flex;
align-items:center;
justify-content:space-between;
padding:4px 0;
}

.brand img{
height:140px;
border-radius:10px;
}

/* NAV */
.nav{
display:flex;
gap:8px;
}

.nav a,.menu-btn{
padding:6px 10px;
border-radius:10px;
font-weight:600;
background:rgba(0,0,0,0.45);

box-shadow:
0 5px 0 rgba(0,0,0,.7),
0 15px 30px rgba(0,0,0,.8);
}

.menu-btn{
background:#fff;
color:#000;
font-weight:700;
}

.menu{position:relative}

.dropdown{
position:absolute;
top:calc(100% + 8px);
right:0;
background:rgba(20,20,20,.9);
border-radius:12px;
padding:6px;
display:none;
}

.menu.open .dropdown{display:block}

/* ===== HERO ===== */
.hero{
padding:40px 0;
text-align:center;
}

/* 🔥 NOVO – NASLOV */
.hero-title{
max-width:900px;
margin:60px auto 20px auto;

font-size:clamp(28px,4vw,48px);
font-weight:700;
line-height:1.2;

text-shadow:
0 0 10px rgba(255,255,255,0.4),
0 0 30px rgba(255,255,255,0.2),
0 20px 60px rgba(0,0,0,0.9);

opacity:0;
transform:translateY(30px);
animation:fadeHero 0.8s ease forwards;
}

@keyframes fadeHero{
to{
opacity:1;
transform:translateY(0);
}
}

/* DUGMAD */
.cta-row{
display:flex;
justify-content:center;
gap:10px;
margin-top:25px;
}

.btn{
padding:10px 20px;
border-radius:30px;
font-weight:700;

box-shadow:
0 6px 0 rgba(0,0,0,.5),
0 15px 30px rgba(0,0,0,.6);
}

.btn-dark{background:#222;color:#fff}
.btn-primary{background:var(--gold);color:#000}

/* ===== GRID ===== */
.grid{
display:grid;
gap:20px;
margin-top:40px;
}

@media(min-width:900px){
.grid{grid-template-columns:1fr 1fr;}
}

.card{
background:rgba(0,0,0,0.6);
padding:25px;
border-radius:15px;
}

/* ===== WHATSAPP ===== */
.whatsapp-float{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25D366;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

</style>
</head>
