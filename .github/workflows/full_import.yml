name: Full Import Contracts

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ===================================================
      # CHECKOUT
      # ===================================================
      - name: Checkout repo
        uses: actions/checkout@v3

      # ===================================================
      # PYTHON
      # ===================================================
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # ===================================================
      # CHROME
      # ===================================================
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      # ===================================================
      # PYTHON DEPENDENCIES
      # ===================================================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install selenium
          pip install beautifulsoup4
          pip install requests
          pip install pypdf

      # ===================================================
      # RUN IMPORT
      # ===================================================
      - name: Run full import
        run: python full_import.py

      # ===================================================
      # COMMIT RESULTS
      # ===================================================
      - name: Commit updated files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add stats.json
          git add loss-data.json
          git add suspicious-winners.json
          git add contracts.db

          git commit -m "Auto full import update" || echo "No changes"
          git push
