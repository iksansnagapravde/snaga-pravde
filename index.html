<!DOCTYPE html>
<html lang="sr-Cyrl-RS">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Иксан – Снага правде | Иницијатива за реформу система извршења</title>

<meta name="description" content="Удружење грађана Иксан – Снага правде. Иницијативе за реформу система извршења, заштиту уставних права грађана и увођење института личне инсолвентности у Републици Србији.">

<meta name="theme-color" content="#020c1b">
<meta name="color-scheme" content="light">

<link rel="icon" href="logo-white.png" type="image/png">

<style>

:root{
--deepBlue:#1f1f1f;
--gold:#d3a451;
--radius:16px;
--ink:#e6e6e6;
}

*{box-sizing:border-box;margin:0;padding:0}

html,body{height:100%}

/* 🔥 POZADINA (cela boginja + kontrast) */
body{
margin:0;
min-height:100vh;

background:
linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.65)),
url('justice-bg.jpg') center top / contain no-repeat fixed,
#000;

color:#fff;
font-family:"Times New Roman",serif;
line-height:1.7;
-webkit-font-smoothing:antialiased;
text-rendering:optimizeLegibility;
font-size:110%;
}

a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

.container{max-width:1150px;margin:0 auto;padding:0 20px}

header{
position:sticky;
top:0;
z-index:100;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(8px);
border-bottom:1px solid rgba(255,255,255,.1);
}

.head{
display:flex;
align-items:center;
justify-content:space-between;
padding:4px 0 0;
gap:12px;
flex-wrap:nowrap;
}

.brand{display:flex;align-items:center;flex-shrink:0;}

.brand img{
height:161px;
border-radius:10px;
}

@media (max-width:768px){
.brand{justify-content:center;margin:0 auto;}
.brand img{height:106px;}
}

nav.nav{
display:flex;
flex-direction:row;
align-items:center;
gap:10px;
padding-top:0;
padding-right:8px;
}

.nav a.nav-link, .menu-btn{
background:rgba(255,255,255,0.05);
color:#fff;
padding:6px 9px;
border-radius:8px;
border:1px solid rgba(255,255,255,.2);
font-weight:600;
font-size:0.9rem;
line-height:1;
backdrop-filter:blur(6px);
transition:.2s;
}

.nav a.nav-link:hover, .menu-btn:hover{
transform:translateY(-1px);
filter:brightness(1.2)
}

.menu{position:relative}

.dropdown{
position:absolute;
top:calc(100% + 8px);
right:0;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.2);
border-radius:12px;
min-width:280px;
padding:6px;
display:none;
}

.menu.open .dropdown{display:block}

.dropdown a{
display:block;
padding:9px 10px;
border-radius:8px;
color:#fff;
font-weight:600;
font-size:14px;
}

.dropdown a:hover{
background:rgba(255,255,255,.08);
}

/* HERO */
.hero{
padding:40px 0;
text-align:left;
}

.hero-grid{display:grid;gap:24px}

@media(min-width:980px){
.hero-grid{grid-template-columns:1.1fr .9fr}
}

/* 🔥 NASLOVI (jak kontrast) */
h1{
font-size:clamp(26px,3vw,36px);
font-weight:700;

text-shadow:
0 0 15px rgba(255,255,255,0.25),
0 20px 50px rgba(0,0,0,1),
0 5px 20px rgba(0,0,0,1);
}

.line2{
display:block;
font-size:clamp(20px,2.5vw,24px);
margin-top:6px;
color:var(--ink);

text-shadow:0 10px 25px rgba(0,0,0,1);
}

.sub{
margin:10px 0 14px;
max-width:740px;
color:var(--ink);

text-shadow:0 10px 25px rgba(0,0,0,1);
}

.cta-row{
display:flex;
gap:8px;
margin-top:14px;
}

.btn{
padding:8px 18px;
border-radius:40px;
font-weight:700;
font-size:13px;
text-transform:uppercase;
cursor:pointer;
}

.btn-primary{background:var(--gold);color:#000}

.btn-dark{
background:rgba(0,0,0,0.6);
color:#fff;
border:1px solid rgba(255,255,255,.3)
}

.hero-media{
border-radius:16px;
overflow:hidden;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(6px);
}

.hero-media img{
width:100%;
height:100%;
object-fit:cover;
}

/* KARTICE */
.grid{
display:grid;
gap:14px;
}

.card{
background:rgba(0,0,0,0.55);
backdrop-filter:blur(10px);
padding:16px;
border-radius:var(--radius);
}

footer{
border-top:1px solid rgba(255,255,255,.15);
text-align:center;
padding:24px 0;
margin-top:30px;
background:rgba(0,0,0,0.6);
}

</style>
</head>

<body>

<header>
<div class="container head">

<div class="brand">
<a href="index.html">
<img src="logo-white.png">
</a>
</div>

<nav class="nav">
<a class="nav-link" href="index.html">Почетна</a>
<a class="nav-link" href="kontakt.html">Контакт</a>
</nav>

</div>
</header>

<main>

<section class="hero">
<div class="container hero-grid">

<div>

<h1>
Реформа система извршења и заштита уставних права грађана
<span class="line2">
Иницијатива за праведнији и одржив правни систем у Србији
</span>
</h1>

<p class="sub">
Удружење грађана „Иксан – Снага правде“ покренуло је иницијативе...
</p>

<div class="cta-row">
<a class="btn btn-dark">ПОГЛЕДАЈ ИНИЦИЈАТИВЕ</a>
<a class="btn btn-primary">ПОДРЖИ РАД</a>
</div>

</div>

<div class="hero-media">
<img src="univ.webp">
</div>

</div>
</section>

</main>

<footer>
© 2025 Иксан • Снага правде
</footer>

</body>
</html>
