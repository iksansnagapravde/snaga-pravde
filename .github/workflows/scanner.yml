name: Update Scanner Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
permissions:
  contents: write

jobs:
  update-scanner:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install feedparser python-dateutil requests

