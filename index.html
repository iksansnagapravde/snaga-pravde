<!DOCTYPE html>
<html lang="sr-Cyrl-RS">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Иксан – Снага правде | Иницијатива за реформу система извршења</title>

<meta name="description" content="Удружење грађана Иксан – Снага правде. Иницијативе за реформу система извршења, заштиту уставних права грађана и увођење института личне инсолвентности у Републици Србији.">

<link rel="icon" href="logo-white.png" type="image/png">

<style>

:root{
--deepBlue:#020c1b;
--gold:#d3a451;
--radius:16px;
--ink:#dcdcdc;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}

/* 🔥 NOVA POZADINA SA DUBINOM */
body{
background: linear-gradient(rgba(2,12,27,0.85), rgba(2,12,27,0.95)),
url('https://images.unsplash.com/photo-1589998059171-988d887df646?q=80&w=1920') center/cover no-repeat fixed;
color:#fff;
font-family:"Times New Roman",serif;
line-height:1.7;
font-size:110%;
position:relative;
overflow-x:hidden;
}

/* dubina (boginja ispod) */
body::before{
content:"";
position:fixed;
inset:0;
background: url('https://images.unsplash.com/photo-1589998059171-988d887df646?q=80&w=1920') center/cover no-repeat;
filter: blur(45px) brightness(0.25);
transform: scale(1.25);
z-index:-2;
}

/* staklo efekat */
body::after{
content:"";
position:fixed;
inset:0;
background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.08), transparent 60%);
backdrop-filter: blur(10px);
z-index:-1;
}

a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

.container{max-width:1150px;margin:0 auto;padding:0 20px}

header{
position:sticky;
top:0;
z-index:100;
background:rgba(2,12,27,0.9);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,.1);
}

.head{
display:flex;
align-items:center;
justify-content:space-between;
padding:4px 0 0;
gap:12px;
}

.brand img{
height:150px;
border-radius:10px;
}

nav.nav{
display:flex;
gap:10px;
}

.nav a.nav-link, .menu-btn{
background:rgba(255,255,255,0.05);
padding:6px 9px;
border-radius:8px;
border:1px solid rgba(255,255,255,.2);
font-weight:600;
font-size:0.9rem;
}

.menu{position:relative}

.dropdown{
position:absolute;
top:100%;
right:0;
background:#020c1b;
border:1px solid rgba(255,255,255,.2);
border-radius:12px;
min-width:260px;
display:none;
}

.menu.open .dropdown{display:block}

.dropdown a{
display:block;
padding:8px;
}

/* HERO */

.hero{padding:40px 0}

.hero-grid{
display:grid;
gap:24px;
}

@media(min-width:980px){
.hero-grid{grid-template-columns:1.1fr .9fr}
}

/* 🔥 NASLOV */
h1{
font-size:clamp(23px,3vw,33px);
text-shadow:
0 0 10px rgba(255,255,255,0.25),
0 0 40px rgba(255,255,255,0.15),
0 20px 60px rgba(0,0,0,1);
}

.line2{
display:block;
font-size:clamp(20px,2.5vw,24px);
color:var(--ink);
margin-top:4px
}

.sub{
margin:8px 0 12px;
color:var(--ink);
}

.cta-row{
display:flex;
gap:8px;
}

.btn{
padding:8px 18px;
border-radius:40px;
font-weight:700;
font-size:13px;
}

.btn-primary{background:var(--gold);color:#000}

.btn-dark{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,.3)
}

.hero-media{
border-radius:16px;
overflow:hidden;
border:1px solid rgba(255,255,255,.15);
aspect-ratio:16/9;
}

.hero-media img{
width:100%;
height:100%;
object-fit:cover;
}

/* CARDS */

.grid{
display:grid;
gap:14px;
}

@media(min-width:900px){
.grid{grid-template-columns:repeat(2,1fr)}
}

.card{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,.2);
border-radius:16px;
padding:16px;
}

footer{
text-align:center;
padding:24px 0;
margin-top:30px;
}

</style>
</head>

<body>

<header>
<div class="container head">

<div class="brand">
<img src="logo-white.png">
</div>

<nav class="nav">
<a href="#">Почетна</a>
<a href="#">Контакт</a>
</nav>

</div>
</header>

<main>

<section class="hero">
<div class="container hero-grid">

<div>

<h1>
Реформа система извршења и заштита уставних права грађана
<span class="line2">
Иницијатива за праведнији и одржив правни систем у Србији
</span>
</h1>

<p class="sub">
Удружење грађана „Иксан – Снага правде“ покренуло је иницијативе...
</p>

<div class="cta-row">
<a href="#" class="btn btn-dark">ИНИЦИЈАТИВЕ</a>
<a href="#" class="btn btn-primary">ПОДРЖИ</a>
</div>

</div>

<div class="hero-media">
<img src="univ.webp">
</div>

</div>
</section>

</main>

</body>
</html>
