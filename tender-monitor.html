<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<title>Tender Monitor</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f7fb;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-left: 5px solid #0a3f78;
}

.bad { border-left: 5px solid red; }
.warn { border-left: 5px solid orange; }
.ok { border-left: 5px solid #0a3f78; }

h2 { margin: 0 0 5px 0; }
p { margin: 4px 0; }

.small {
  font-size: 12px;
  color: #666;
}
</style>
</head>

<body>

<h1>📊 Tender Monitor</h1>

<div id="stats" class="card">Učitavanje...</div>
<div id="loss" class="card">Učitavanje...</div>

<h2>📄 Lista tendera</h2>
<div id="list"></div>

<h2>🏆 Rang firmi</h2>
<div id="ranking"></div>

<script>

// =======================
// FORMAT
// =======================
function format(x){
  if (!x) return "-";
  return Number(x).toLocaleString("sr-RS") + " RSD";
}

function parseNumber(x){
  return parseInt(x?.toString().replace(/[^\d]/g,"")) || 0;
}

// =======================
// STATS
// =======================
fetch("stats.json?" + Date.now())
.then(r => r.json())
.then(s => {
  document.getElementById("stats").innerHTML = `
    <h2>📈 Statistika</h2>
    <p><b>Broj tendera:</b> ${s.broj_tendera}</p>
    <p><b>Ukupna vrednost:</b> ${s.ukupna_vrednost}</p>
    <p><b>Ukupna vrednost (EUR):</b> ${s.ukupna_vrednost_eur}</p>
  `;
})
.catch(() => {
  document.getElementById("stats").innerHTML = "Greška učitavanja stats.json";
});

// =======================
// LOSS
// =======================
fetch("loss-data.json?" + Date.now())
.then(r => r.json())
.then(l => {

  const div = document.getElementById("loss");

  const lossValue = parseNumber(l.gubitak_prema_najboljoj);

  if (lossValue > 1000000) {
    div.classList.add("bad");
  } else if (lossValue > 0) {
    div.classList.add("warn");
  } else {
    div.classList.add("ok");
  }

  div.innerHTML = `
    <h2>⚠ Gubici</h2>
    <p><b>Gubitak prema najboljoj:</b> ${l.gubitak_prema_najboljoj}</p>
    <p><b>Najbolja ponuda:</b> ${l.najbolja_ponuda}</p>
    <p><b>Srednja ponuda:</b> ${l.srednja_ponuda}</p>
    <p><b>Prihvaćena ponuda:</b> ${l.prihvacena_ponuda}</p>
  `;
})
.catch(() => {
  document.getElementById("loss").innerHTML = "Greška učitavanja loss-data.json";
});

// =======================
// TENDERS
// =======================
fetch("tenders.json?" + Date.now())
.then(r => r.json())
.then(data => {

  const list = document.getElementById("list");
  const rankingMap = {};

  if (!data || data.length === 0) {
    list.innerHTML = "<p>Nema podataka</p>";
    return;
  }

  data.forEach(t => {

    const div = document.createElement("div");
    div.className = "card";

    if (t.suspicious) {
      div.classList.add("bad");
    } else if (t.status === "objasnjeno") {
      div.classList.add("warn");
    } else {
      div.classList.add("ok");
    }

    // 👇 KLJUČNO: fallback ako nema winner
    const name = t.winner || "Nepoznato";

    div.innerHTML = `
      <h2>${name}</h2>

      <p><b>ID:</b> ${t.id}</p>

      <p><b>Prihvaćena:</b> ${format(t.accepted)}</p>
      <p><b>Najniža:</b> ${format(t.lowest)}</p>
      <p><b>Razlika:</b> ${format(t.difference)}</p>

      <p><b>Status:</b> ${t.status}</p>

      ${t.rejection_reasons && t.rejection_reasons.length ? 
        `<p class="small"><b>Razlozi:</b> ${t.rejection_reasons.join(", ")}</p>` 
        : ""
      }
    `;

    list.appendChild(div);

    // =======================
    // RANKING (samo ako postoji firma)
    // =======================
    if (t.winner) {
      if (!rankingMap[t.winner]) {
        rankingMap[t.winner] = {
          count: 0,
          total: 0
        };
      }

      rankingMap[t.winner].count += 1;
      rankingMap[t.winner].total += t.accepted || 0;
    }

  });

  // =======================
  // RENDER RANKING
  // =======================
  const ranking = Object.entries(rankingMap)
    .sort((a,b) => b[1].total - a[1].total);

  const rankingDiv = document.getElementById("ranking");

  if (ranking.length === 0) {
    rankingDiv.innerHTML = "<p>Nema rangiranih firmi</p>";
    return;
  }

  ranking.forEach(([name, val], i) => {
    const d = document.createElement("div");
    d.className = "card";

    d.innerHTML = `
      <b>#${i+1} ${name}</b><br>
      Ugovori: ${val.count}<br>
      Vrednost: ${format(val.total)}
    `;

    rankingDiv.appendChild(d);
  });

})
.catch(() => {
  document.getElementById("list").innerHTML = "Greška učitavanja tenders.json";
});

</script>

</body>
</html>
