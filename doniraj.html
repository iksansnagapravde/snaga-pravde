<!DOCTYPE html>
<html lang="sr-Cyrl-RS">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Подржи наш рад — Иксан • Снага правде</title>

<link rel="icon" href="logo-white.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#0a3f78;
  --orange:#ff5a1f;
  --orange-dark:#e44e16;
  --gold:#d3a451;
  --line:rgba(0,0,0,0.12);
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Playfair Display",serif;padding-bottom:140px;overflow-x:hidden}

/* POZADINA */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
  linear-gradient(to bottom, rgba(255,255,255,0.92), rgba(255,255,255,0.96)),
  url('lady-justice-hero.webp') center top / cover no-repeat;
  animation:goddessReveal 1.2s ease-out both;
}

@keyframes goddessReveal{
  0%{transform:translate(120px,140px) scale(1.1);opacity:.8}
  100%{transform:translate(0,0) scale(1);opacity:1}
}

/* HEADER */
header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);z-index:1000}
.head{max-width:1150px;margin:auto;padding:10px 0;display:flex;justify-content:space-between;align-items:center}

.brand{display:flex;align-items:center;gap:12px;padding-left:12px}
.logo-box{width:72px;height:72px;background:var(--blue);display:flex;align-items:center;justify-content:center}
.logo-box img{width:66px}

.brand-text .top{font-size:.58rem;color:#777}
.brand-text .main{font-size:.82rem;font-weight:600;white-space:nowrap}

.nav-right{display:flex;align-items:center;gap:12px;padding-right:12px}

.donate-btn{
  background:linear-gradient(135deg,var(--orange),var(--orange-dark));
  color:#fff;padding:10px 12px;min-width:95px;
  font-size:.72rem;font-weight:700;
}

/* HERO */
.hero-space{height:260px}

/* CTA */
.top-buttons{display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:-80px}
.btn-lite{background:#fff;border:1px solid rgba(10,63,120,.25);padding:12px 24px;font-size:.85rem;color:#0a3f78;font-weight:600}
.btn-main{background:var(--blue);color:#fff;padding:16px 30px;font-size:.95rem;font-weight:700}

/* CONTENT */
.container{max-width:1150px;margin:auto;padding:20px}
.grid{display:grid;gap:20px;margin-top:30px}

/* LUX CARD */
.doc-card{
  padding:22px;
  background:#fff;
  border:1px solid var(--line);
  box-shadow:0 15px 40px rgba(0,0,0,.12);
  transition:.3s;
}
.doc-card:hover{
  transform:translateY(-4px);
  box-shadow:0 20px 50px rgba(0,0,0,.18);
}

.doc-card.blue{background:var(--blue);color:#fff}

/* DONATION UI */
.amounts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.amount-btn{
  padding:10px;
  text-align:center;
  background:#f1f1f1;
  cursor:pointer;
  border-radius:8px;
  font-weight:600;
}
.amount-btn.active{
  background:linear-gradient(135deg,#ffd700,#ffb300);
}

.custom{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  text-align:center;
}

/* LUX BUTTON */
.main-donate{
  margin-top:12px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:40px;
  font-weight:900;
  font-size:15px;
  cursor:pointer;

  background:linear-gradient(135deg,#ffd700,#ffb300);
  box-shadow:0 6px 0 #cc9a00, 0 0 25px rgba(255,215,0,.5);

  transition:.25s;
}
.main-donate:hover{
  transform:translateY(-2px) scale(1.03);
}

/* SOCIAL */
.social-bar{
  position:fixed;
  right:-80px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:12px;
  opacity:0;
  transition:.6s;
}
.social-bar.show{right:12px;opacity:1}
.social-bar a{
  width:44px;height:44px;background:#fff;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--line);
}
.social-bar img{width:20px}

/* WHATSAPP */
.wa-btn{
  position:fixed;
  right:-220px;
  bottom:50px;
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 14px;
  background:#25D366;
  color:#fff;
  border-radius:40px;
  transition:.6s;
}
.wa-btn.show{right:12px}
.wa-btn img{width:22px;filter:brightness(0) invert(1)}

</style>
</head>

<body>

<header>
<div class="head">

<div class="brand">
<div class="logo-box"><img src="logo-white.png"></div>
<div class="brand-text">
<div class="top">Удружење грађана</div>
<div class="main">Иксан Снага правде</div>
</div>
</div>

<div class="nav-right">
<a href="#" class="donate-btn">ДОНИРАЈ</a>
</div>

</div>
</header>

<div class="hero-space"></div>

<div class="top-buttons">
<a href="inicijative.html" class="btn-lite">ЗАКОНИ И ПРОПИСИ</a>
<a href="prijavi.html" class="btn-main">ПРЕДСТАВКА ГРАЂАНИНА</a>
</div>

<div class="container">

<div class="grid">

<!-- PAYPAL -->
<div class="doc-card">
<h2 style="text-align:center">Подржи наш рад</h2>

<div class="amounts">
<div class="amount-btn active" data="10">10€</div>
<div class="amount-btn" data="20">20€</div>
<div class="amount-btn" data="50">50€</div>
<div class="amount-btn" data="100">100€</div>
</div>

<input type="number" id="customAmount" class="custom" placeholder="Унесите износ (€)">

<button class="main-donate" id="donateBtn">
ДОНИРАЈТЕ САДА
</button>

<p style="text-align:center;font-size:12px;margin-top:8px;color:#666;">
🔒 Сигурна уплата — PayPal
</p>

</div>

<!-- BANK -->
<div class="doc-card blue">

<h3>ОНЛАЈН БАНКИНГ</h3>

<p><b>Прималац:</b> ИКСАН Снага правде</p>
<p><b>Жиро-рачун:</b> 340-1000345580-18</p>
<p><b>Банка:</b> Erste Bank</p>
<p><b>Сврха:</b> Донација</p>

<hr>

<p><b>Модел:</b> 00</p>
<p><b>Позив на број:</b> 2026</p>

</div>

</div>

</div>

<div class="social-bar" id="socialBar">
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg"></a>
</div>

<a href="https://wa.me/381665857707" class="wa-btn">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
Пишите нам
</a>

<script>
let amount=10;

document.querySelectorAll('.amount-btn').forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll('.amount-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
amount=btn.dataset;
};
});

document.getElementById('donateBtn').onclick=()=>{
let custom=document.getElementById('customAmount').value;
let finalAmount=custom || amount;
window.open(`https://www.paypal.me/snagapravde/${finalAmount}`,'_blank');
};

window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("socialBar").classList.add("show");
document.querySelector(".wa-btn").classList.add("show");
},400);
});
</script>

</body>
</html>
