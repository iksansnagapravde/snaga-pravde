<!DOCTYPE html>
<html lang="sr-Cyrl-RS">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Представка грађанина | Иксан – Снага правде</title>

<link rel="icon" href="logo-white.png" type="image/png">

<style>

:root{
--deepBlue:#1f1f1f;
--gold:#d3a451;
--radius:16px;
--ink:#dcdcdc;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
background:url('justice-bg.jpg') center 25%/cover no-repeat fixed;
color:#fff;
font-family:"Times New Roman",serif;
}

.container{max-width:1150px;margin:auto;padding:0 20px}

header{
position:sticky;
top:0;
z-index:100;
backdrop-filter:blur(6px);
border-bottom:1px solid rgba(255,255,255,.1);
}

.head{
display:flex;
justify-content:space-between;
align-items:center;
padding:6px 0;
}

.brand img{height:120px;border-radius:10px}

.nav{display:flex;gap:10px}

.nav a,.menu-btn{
padding:6px 10px;
border:1px solid rgba(255,255,255,.2);
border-radius:8px;
color:#fff;
font-weight:600;
text-decoration:none;
}

.menu{position:relative}

.dropdown{
position:absolute;
right:0;
top:110%;
background:rgba(20,20,20,.9);
border-radius:12px;
padding:6px;
display:none;
}

.menu.open .dropdown{display:block}

.dropdown a{
display:block;
padding:8px;
color:#fff;
text-decoration:none;
}

/* HERO */

.hero{
padding:30px 0;
text-align:center;
}

h1{
font-size:28px;
margin-bottom:10px;
}

/* BUTTON */

.btn{
display:inline-block;
padding:10px 20px;
border-radius:40px;
font-weight:700;
cursor:pointer;
margin:6px;
position:relative;
overflow:hidden;
text-decoration:none;
}

.btn-primary{background:var(--gold);color:#000}
.btn-dark{background:#222;color:#fff}

.btn:hover{transform:translateY(-2px)}
.btn:active{transform:scale(0.95)}

/* RIPPLE */

.btn span.ripple{
position:absolute;
border-radius:50%;
transform:scale(0);
animation:ripple 0.7s ease-out;
background:radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.4) 40%, transparent 70%);
pointer-events:none;
}

@keyframes ripple{
to{transform:scale(4);opacity:0}
}

/* CONTENT */

.card{
background:rgba(20,20,20,.6);
padding:20px;
border-radius:16px;
margin:20px 0;
box-shadow:0 10px 30px rgba(0,0,0,.5);
}

iframe{
width:100%;
height:600px;
border:none;
border-radius:16px;
}

footer{
text-align:center;
padding:30px;
font-size:14px;
}

</style>
</head>

<body>

<header>
<div class="container head">

<div class="brand">
<a href="index.html"><img src="logo-white.png"></a>
</div>

<nav class="nav">

<a href="index.html">Почетна</a>

<button class="menu-btn">Мени ▾</button>

<div class="dropdown">

<a href="oblasti.html">Области деловања</a>

<a href="inicijative.html">Иницијативе</a>
<a href="doniraj.html">Подршка раду</a>
<a href="prikljucise.html">Сарадња</a>
<a href="prijavi.html">Представка</a>
</div>
</div>

</nav>
</div>
</header>

<main>

<section class="hero">
<h1>ПРЕДСТАВКА ГРАЂАНИНА</h1>

<p>
Преузмите, одштампајте, попуните и пошаљите на:<br>
<b>iksan.snaga.pravde@gmail.com</b>
</p>
</section>

<div class="container">

<div class="card">
<iframe src="OBRAZAC_PREDSTAVKA.GRADJAN.pdf"></iframe>
</div>

<div style="text-align:center">
<a href="OBRAZAC_PREDSTAVKA.GRADJAN.pdf" target="_blank" class="btn btn-primary">
ОДШТАМПАЈ ОБРАЗАЦ
</a>
</div>

<h1 style="margin-top:40px">ПРАВИЛНИК О ПОСТУПАЊУ</h1>

<div class="card">
<iframe src="PRAVILNIK_PREDSTAVKE.pdf"></iframe>
</div>

<div style="text-align:center">
<a href="PRAVILNIK_PREDSTAVKE.pdf" target="_blank" class="btn btn-dark">
ОТВОРИ ПРАВИЛНИК
</a>
</div>

</div>

</main>

<footer>
© 2025 Иксан • Снага правде
</footer>

<script>

const menu=document.getElementById('mainMenu');
menu.querySelector('.menu-btn').onclick=()=>{
menu.classList.toggle('open');
};

document.addEventListener('click',(e)=>{
if(!menu.contains(e.target)){
menu.classList.remove('open');
}
});

document.querySelectorAll('.btn').forEach(btn=>{
btn.addEventListener('click',function(e){

const ripple=document.createElement('span');
ripple.classList.add('ripple');

const rect=this.getBoundingClientRect();
const size=this.offsetWidth;

ripple.style.width=size+'px';
ripple.style.height=size+'px';

ripple.style.left=(e.clientX-rect.left-size/2)+'px';
ripple.style.top=(e.clientY-rect.top-size/2)+'px';

this.appendChild(ripple);

setTimeout(()=>ripple.remove(),600);

});
});

</script>

</body>
</html>
