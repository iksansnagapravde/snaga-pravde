name: Update Scanner Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install feedparser python-dateutil

      - name: Build scanner-data.json
        run: |
          python << 'PY'
          import json
          import re
          import feedparser
          from datetime import datetime, timezone, timedelta
          from email.utils import parsedate_to_datetime

          FEEDS = [
              ("N1", "https://n1info.rs/feed/"),
              ("Danas", "https://www.danas.rs/feed/"),
              ("Nova", "https://nova.rs/feed/"),
              ("BIRN", "https://birn.rs/feed/"),
              ("CINS", "https://www.cins.rs/feed/"),
              ("Insajder", "https://insajder.net/rss"),
              ("RTS", "https://www.rts.rs/page/stories/sr/rss/1/vesti.html")
          ]

          SERBIA_WORDS = [
              "srbija", "serbia", "srbij", "beograd", "belgrade",
              "србија", "србиј", "београд"
          ]

          TOPIC_WORDS = [
              "korup", "коруп",
              "izvrš", "izvrs", "изврш", "dug", "дуг", "дугов",
              "plata", "plate", "zarada", "зарада", "плата", "minimal", "минимал",
              "penzij", "пензи",
              "deca", "djeca", "dete", "дете", "деца",
              "invalid", "инвалид", "hendikep",
              "manjin", "мањин", "diskrimin", "дискримин",
              "pritvor", "притвор", "zatvor", "затвор", "lišen", "lisen", "лише",
              "suđen", "sudjen", "suđenje", "sudjenje", "суђе", "pravosu", "правосу",
              "tender", "тендер", "javne nabavke", "јавне набавке", "infrastrukt", "инфраструкт",
              "socijal", "социјал", "siroma", "сиромашт",
              "medij", "медиј", "izbor", "избор", "građansk", "gradjansk", "грађанск",
              "zdravst", "здравств", "obrazov", "образов",
              "haps", "хапш", "sloboda", "слобода"
          ]

          def clean_html(text):
              text = text or ""
              text = re.sub(r"<[^>]+>", " ", text)
              text = re.sub(r"\s+", " ", text)
              return text.strip()

          def parse_date(entry):
              for key in ["published", "updated", "created"]:
                  val = entry.get(key)
                  if val:
                      try:
                          dt = parsedate_to_datetime(val)
                          if dt.tzinfo is None:
                              dt = dt.replace(tzinfo=timezone.utc)
                          return dt.astimezone(timezone.utc)
                      except Exception:
                          pass
              return None

          def contains_any(text, words):
              t = (text or "").lower()
              return any(w in t for w in words)

          def detect_category(text):
              t = (text or "").lower()

              if any(k in t for k in ["izvrš", "izvrs", "изврш", "дуг", "дугов"]):
                  return "Извршења и дугови"
              if any(k in t for k in ["plata", "plate", "zarada", "зарада", "плата", "minimal", "минимал"]):
                  return "Радничка права и плате"
              if any(k in t for k in ["socijal", "социјал", "siroma", "сиромашт"]):
                  return "Социјална права"
              if any(k in t for k in ["deca", "djeca", "dete", "дете", "деца"]):
                  return "Права деце"
              if any(k in t for k in ["penzij", "пензи"]):
                  return "Права пензионера"
              if any(k in t for k in ["invalid", "инвалид", "hendikep"]):
                  return "Права особа са инвалидитетом"
              if any(k in t for k in ["manjin", "мањин", "diskrimin", "дискримин"]):
                  return "Мањинска права"
              if any(k in t for k in ["pritvor", "притвор", "zatvor", "затвор", "lišen", "lisen", "лише"]):
                  return "Притворени, осуђени и лишени слободе"
              if any(k in t for k in ["suđen", "sudjen", "suđenje", "sudjenje", "суђе", "pravosu", "правосу"]):
                  return "Правосуђе и приступ правди"
              if any(k in t for k in ["korup", "коруп", "haps", "хапш"]):
                  return "Корупција и хапшења"
              if any(k in t for k in ["tender", "тендер", "javne nabavke", "јавне набавке", "infrastrukt", "инфраструкт"]):
                  return "Јавне набавке и инфраструктурни пројекти"
              if any(k in t for k in ["medij", "медиј", "izbor", "избор", "građansk", "gradjansk", "грађанск", "sloboda", "слобода"]):
                  return "Избори и грађанске слободе"
              if any(k in t for k in ["zdravst", "здравств"]):
                  return "Здравство"
              if any(k in t for k in ["obrazov", "образов"]):
                  return "Образовање"
              return "Људска права"

          now = datetime.now(timezone.utc)
          cutoff = now - timedelta(days=10)

          collected = []
          seen_links = set()

          for source_name, feed_url in FEEDS:
              feed = feedparser.parse(feed_url)

              for item in feed.entries:
                  title = (item.get("title") or "").strip()
                  link = (item.get("link") or "").strip()
                  summary = clean_html(item.get("summary") or item.get("description") or "")

                  if not title or not link:
                      continue
                  if link in seen_links:
                      continue

                  blob = f"{title} {summary}"

                  if not contains_any(blob, SERBIA_WORDS):
                      continue

                  if not contains_any(blob, TOPIC_WORDS):
                      continue

                  dt = parse_date(item)
                  if dt is None:
                      dt = now

                  if dt < cutoff:
                      continue

                  seen_links.add(link)

                  collected.append({
                      "id": re.sub(r"[^a-zA-Z0-9]+", "-", link)[-60:],
                      "title": title,
                      "url": link,
                      "date": dt.date().isoformat(),
                      "source": source_name,
                      "category": detect_category(blob),
                      "summary": ""
                  })

          if not collected:
              fallback = []
              seen_links = set()

              for source_name, feed_url in FEEDS:
                  feed = feedparser.parse(feed_url)

                  for item in feed.entries:
                      title = (item.get("title") or "").strip()
                      link = (item.get("link") or "").strip()
                      summary = clean_html(item.get("summary") or item.get("description") or "")

                      if not title or not link:
                          continue
                      if link in seen_links:
                          continue

                      blob = f"{title} {summary}"

                      if not contains_any(blob, SERBIA_WORDS):
                          continue

                      dt = parse_date(item)
                      if dt is None:
                          dt = now

                      if dt < cutoff:
                          continue

                      seen_links.add(link)

                      fallback.append({
                          "id": re.sub(r"[^a-zA-Z0-9]+", "-", link)[-60:],
                          "title": title,
                          "url": link,
                          "date": dt.date().isoformat(),
                          "source": source_name,
                          "category": detect_category(blob),
                          "summary": ""
                      })

              collected = fallback

          collected.sort(
              key=lambda x: (x["date"], x["source"], x["title"]),
              reverse=True
          )

          collected = collected[:10]

          with open("scanner-data.json", "w", encoding="utf-8") as f:
              json.dump({"entries": collected}, f, ensure_ascii=False, indent=2)
          PY

      - name: Commit updated scanner-data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scanner-data.json
          git diff --staged --quiet || git commit -m "Update scanner data"
          git push
