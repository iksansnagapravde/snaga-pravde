<!DOCTYPE html>
<html lang="sr-Cyrl-RS">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Заштита људских права и одговорност институција</title>

<link rel="icon" href="logo-white.png">

<style>

:root{
--gold:#d3a451;
--ink:#dcdcdc;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
min-height:100vh;
background:
linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
radial-gradient(circle at center, rgba(255,255,255,0.04), transparent 60%),
url('justice-bg.jpg') center 20% / cover no-repeat fixed;
color:#fff;
font-family:"Times New Roman",serif;
padding-bottom:140px;
overflow-x:hidden;
}

a{text-decoration:none;color:#fff}

/* CURSOR GLOW */
.cursor-glow{
position:fixed;
width:300px;
height:300px;
border-radius:50%;
pointer-events:none;
z-index:0;
background:radial-gradient(circle, rgba(211,164,81,0.18), transparent 60%);
filter:blur(50px);
transform:translate(-50%, -50%);
}

/* HEADER (NE DIRAM) */
header{
position:sticky;
top:0;
z-index:100;
backdrop-filter:blur(6px);
border-bottom:1px solid rgba(255,255,255,.1);
}

.head{
display:flex;
align-items:center;
justify-content:space-between;
padding:4px 10px;
}

.brand img{height:95px;}

.nav{
display:flex;
align-items:center;
gap:8px;
}

.nav a,.menu-btn{
padding:6px 10px;
border-radius:10px;
background:rgba(0,0,0,0.45);
font-weight:600;
font-size:0.85rem;
box-shadow:0 5px 0 rgba(0,0,0,.7),0 15px 30px rgba(0,0,0,.8);
}

.menu-btn{
background:#fff;
color:#000;
font-weight:700;
}

.menu{position:relative}

.dropdown{
position:absolute;
top:100%;
right:0;
background:rgba(20,20,20,0.95);
border-radius:12px;
padding:6px;
display:none;
min-width:260px;
}

.menu.open .dropdown{display:block}

.dropdown a{display:block;padding:8px;}

/* HERO */
.hero{
min-height:70vh;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
padding-top:40px;
}

h1{
font-size:clamp(20px,5vw,28px);
margin-top:30px;
margin-bottom:10px;
}

.sub{
color:var(--ink);
font-size:15px;
margin-top:-10px;
}

/* CTA */
.cta-row{
display:flex;
flex-direction:column;
align-items:center;
gap:14px;
margin-top:35px;
}

.btn{
padding:12px 20px;
border-radius:40px;
font-weight:700;
font-size:13px;
box-shadow:0 6px 0 rgba(0,0,0,.5),0 15px 30px rgba(0,0,0,.6);
transition:0.25s;
}

.btn:hover{
transform:translateY(-2px) scale(1.03);
}

/* BIG CTA */
.big-cta{
margin-top:60px;
padding:18px 35px;
border-radius:18px;
font-weight:700;
background:rgba(40,50,80,0.6);
backdrop-filter:blur(12px);
border:1px solid rgba(120,170,255,0.3);
transition:0.3s;
}
.big-cta:hover{
transform:scale(1.05);
}

/* GRID */
.grid{
display:grid;
gap:20px;
padding:0 20px;
margin-top:40px;
}

@media(min-width:900px){
.grid{grid-template-columns:1fr 1fr;}
}

/* CARD */
.card{
padding:24px;
border-radius:20px;
background:linear-gradient(135deg, rgba(25,25,25,0.85), rgba(10,10,10,0.95));
border:1px solid rgba(255,255,255,0.12);
transition:0.2s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 30px 70px rgba(0,0,0,.9);
}

/* CLICK EFFECT */
.card:active{
transform:scale(0.96);
box-shadow:0 10px 30px rgba(0,0,0,.8) inset;
}

.card h3{margin-bottom:10px;}
.card p{color:#ccc;font-size:14px;}

/* GRAPH */
.bar{
height:6px;
background:rgba(255,255,255,0.1);
margin-top:6px;
border-radius:10px;
overflow:hidden;
}
.fill{height:100%;background:gold;}
.fill.red{background:red;}

/* SOCIAL */
.social-bar{
position:fixed;
right:-80px;
bottom:110px;
display:flex;
flex-direction:column;
gap:12px;
z-index:9999;
transition:right 0.6s ease;
}
.social-bar.show{right:12px;}

.social-bar a{
width:44px;height:44px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
background:rgba(20,20,20,0.55);
backdrop-filter:blur(12px);
}

/* WHATSAPP */
.wa-btn{
position:fixed;
bottom:20px;
right:-180px;
display:flex;
align-items:center;
gap:8px;
padding:10px 16px;
border-radius:40px;
background:#25d366;
z-index:9999;
transition:right 0.6s ease;
}
.wa-btn.show{right:12px;}
.wa-btn img{width:22px;}

</style>
</head>

<body>

<div class="cursor-glow" id="glow"></div>

<header>
<div class="head">
<div class="brand">
<a href="index.html"><img src="logo-white.png"></a>
</div>

<nav class="nav">
<a href="index.html">ПОЧЕТНА</a>
<a href="kontakt.html">КОНТАКТ</a>

<div class="menu" id="menu">
<button class="menu-btn">МЕНИ ▾</button>
<div class="dropdown">
<a href="uradili.html">Шта смо урадили</a>
</div>
</div>
</nav>
</div>
</header>

<div class="hero">

<h1>Заштита људских права и одговорност институција</h1>
<p class="sub">Удружење грађана „Иксан – Снага правде“</p>

<div class="cta-row">
<a href="inicijative.html" class="btn">ЗАКОНИ</a>
<a href="prijavi.html" class="btn">ПРЕДСТАВКА</a>
<a href="doniraj.html" class="btn">ПОДРЖИ</a>
</div>

<a href="uradili.html" class="big-cta">
ПОГЛЕДАЈ ШТА СМО УРАДИЛИ
</a>

</div>

<div class="grid">

<a href="egzistencijalni-minimum.html" class="card">
<h3>Нико не сме живети испод минимума</h3>
<p>Гарантован минимум за живот.</p>
<div class="bar"><div class="fill red" style="width:40%"></div></div>
<div class="bar"><div class="fill" style="width:90%"></div></div>
</a>

<a href="ukidanjeizvrsitelja.html" class="card">
<h3>Крај дужничког ропства</h3>
<p>Заштита грађана.</p>
<div class="bar"><div class="fill red" style="width:80%"></div></div>
<div class="bar"><div class="fill" style="width:60%"></div></div>
</a>

</div>

<!-- SOCIAL -->
<div class="social-bar" id="socialBar">
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg"></a>
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg"></a>
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg"></a>
<a href="#"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg"></a>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/381665857707" class="wa-btn" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
Пишите нам
</a>

<script>
const glow=document.getElementById("glow");
document.addEventListener("mousemove",e=>{
glow.style.left=e.clientX+"px";
glow.style.top=e.clientY+"px";
});

const menu=document.getElementById('menu');
menu.querySelector('.menu-btn').onclick=()=>menu.classList.toggle('open');

window.addEventListener("load",()=>{
setTimeout(()=>{
document.querySelector(".wa-btn").classList.add("show");
document.getElementById("socialBar").classList.add("show");
},400);
});
</script>

</body>
</html>
