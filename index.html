<!DOCTYPE html>
<html lang="sr-Cyrl-RS">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Иксан – Снага правде | Иницијатива за реформу система извршења</title>

<link rel="icon" href="logo-white.png" type="image/png">

<style>

:root{
--deepBlue:#1f1f1f;
--gold:#d3a451;
--radius:16px;
--ink:#dcdcdc;
}

*{box-sizing:border-box;margin:0;padding:0}

html,body{height:100%}

/* 🔥 BODY BEZ POZADINE */
body{
background:#000;
color:#fff;
font-family:"Times New Roman",serif;
line-height:1.7;
overflow-x:hidden;
}

/* 🔥 3D POZADINA */
.bg-3d{
position:fixed;
top:0;
left:0;
width:120%;
height:120%;
background:
linear-gradient(rgba(2,12,27,0.25), rgba(2,12,27,0.45)),
url('justice-bg.jpg') center/cover no-repeat;
z-index:-2;
transform:scale(1.1);
animation: floatBg 20s ease-in-out infinite;
}

/* 💡 REFLEKS */
.light{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
background:radial-gradient(circle at center, rgba(255,255,255,0.12), transparent 60%);
mix-blend-mode:soft-light;
}

/* 🌊 BLAGO KRETANJE */
@keyframes floatBg{
0%{transform:scale(1.08) translate(0,0)}
50%{transform:scale(1.12) translate(-10px,-10px)}
100%{transform:scale(1.08) translate(0,0)}
}

a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

.container{max-width:1150px;margin:0 auto;padding:0 20px}

/* 🔥 HEADER PROVIDAN */
header{
position:sticky;
top:0;
z-index:100;
background:rgba(20,20,20,0.35);
backdrop-filter: blur(4px);
border-bottom:1px solid rgba(255,255,255,.15);
}

/* NAV dugmad */
.nav a.nav-link, .menu-btn{
background:rgba(20,20,20,0.4);
}

/* DROPDOWN */
.dropdown{
background:rgba(20,20,20,0.5);
backdrop-filter: blur(6px);
}

/* HERO */
.hero{padding:24px 0 0}

.hero-grid{display:grid;gap:24px}

@media(min-width:980px){
.hero-grid{grid-template-columns:1.1fr .9fr}
}

h1{
color:#fff;
margin-top:8px;
line-height:1.2;
font-weight:600;
font-size:clamp(23px,3vw,33px);
text-shadow:0 0 10px rgba(255,255,255,.3);
}

.line2{
display:block;
font-size:clamp(20px,2.5vw,24px);
color:var(--ink);
margin-top:4px
}

.sub{
margin:8px 0 12px;
max-width:740px;
color:var(--ink);
opacity:.95;
font-size:clamp(16px,2vw,18px)
}

.cta-row{
display:flex;
justify-content:center;
flex-wrap:nowrap;
gap:8px;
margin-top:14px;
}

.btn{
display:inline-block;
padding:8px 18px;
border-radius:40px;
font-weight:700;
font-size:13px;
text-transform:uppercase;
cursor:pointer;
box-shadow:0 3px 0 rgba(0,0,0,.4);
}

.btn-primary{background:var(--gold);color:var(--deepBlue)}
.btn-dark{
background:rgba(20,20,20,0.5);
border:1px solid rgba(255,255,255,.3)
}

/* HERO MEDIA */
.hero-media{
border-radius:16px;
overflow:hidden;
border:1px solid rgba(255,255,255,.2);
background:rgba(20,20,20,0.4);
}

/* 🔥 KARTICE PROVIDNE */
.card{
background:rgba(20,20,20,0.4);
backdrop-filter: blur(4px);
border:1px solid rgba(255,255,255,.2);
border-radius:var(--radius);
padding:16px;
}

/* FOOTER */
footer{
border-top:1px solid rgba(255,255,255,.15);
text-align:center;
padding:24px 0;
background:rgba(20,20,20,0.35);
backdrop-filter: blur(4px);
}

</style>
</head>

<body>

<!-- 🔥 3D SLOJEVI -->
<div class="bg-3d"></div>
<div class="light"></div>

<header>
<div class="container head">

<div class="brand">
<a href="index.html">
<img src="logo-white.png">
</a>
</div>

<nav class="nav">

<a class="nav-link" href="index.html">Почетна</a>
<a class="nav-link" href="kontakt.html">Контакт</a>

<div class="menu" id="mainMenu">
<button class="menu-btn">Мени ▾</button>

<div class="dropdown">
<a href="onama.html">О удружењу</a>
<a href="oblasti.html">Области деловања</a>
<a href="ciljevi.html">Стратешки циљеви</a>
<a href="inicijative.html">Иницијативе</a>
</div>
</div>

</nav>

</div>
</header>

<main>

<section class="hero">
<div class="container hero-grid">

<div>
<h1>
Реформа система извршења
<span class="line2">Праведнији систем</span>
</h1>

<p class="sub">Иницијатива за заштиту грађана.</p>

<div class="cta-row">
<a class="btn btn-dark">ИНИЦИЈАТИВЕ</a>
<a class="btn btn-primary">ПОДРЖИ</a>
</div>

</div>

<div class="hero-media">
<img src="univ.webp">
</div>

</div>
</section>

<section class="split">
<div class="container">

<div class="grid">

<article class="card">
<h3>Реформа система</h3>
<p>Јачање правде.</p>
</article>

<article class="card">
<h3>Независност судства</h3>
<p>Ефикаснији систем.</p>
</article>

</div>

</div>
</section>

</main>

<footer>
<div class="container">
© 2025 Иксан
</div>
</footer>

<script>

/* MENI */
const menu = document.getElementById('mainMenu');
const menuBtn = menu.querySelector('.menu-btn');

menuBtn.addEventListener('click', () => {
const isOpen = menu.classList.toggle('open');
menuBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
});

/* 3D PARALLAX */
const bg = document.querySelector('.bg-3d');
const light = document.querySelector('.light');

document.addEventListener('mousemove', (e) => {

const x = (e.clientX / window.innerWidth - 0.5) * 40;
const y = (e.clientY / window.innerHeight - 0.5) * 40;

bg.style.transform = translate(${-x}px, ${-y}px) scale(1.1);

light.style.background =
radial-gradient(circle at ${e.clientX}px ${e.clientY}px, rgba(255,255,255,0.15), transparent 60%);

});

</script>

</body>
</html>
