name: Update Scanner Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-scanner:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install feedparser python-dateutil

      - name: Build scanner-data.json
        run: |
          python << 'PY'
          import json
          import re
          import feedparser
          from datetime import datetime, timezone, timedelta
          from email.utils import parsedate_to_datetime

          FEEDS = [

          # SRBIJA DRŽAVNI / GLAVNI
          ("RTS","https://www.rts.rs/page/stories/sr/rss/1/vesti.html"),
          ("RTV","https://www.rtv.rs/sr_lat/rss"),
          ("Tanjug","https://www.tanjug.rs/rss"),

          # KOMERCIJALNI
          ("Blic","https://www.blic.rs/rss/dnevne-vesti"),
          ("Kurir","https://www.kurir.rs/rss"),
          ("Novosti","https://www.novosti.rs/rss"),
          ("Politika","https://www.politika.rs/rss"),
          ("B92","https://www.b92.net/info/rss"),

          # PROVLADINI
          ("Informer","https://informer.rs/rss"),
          ("Pink","https://pink.rs/rss"),

          # NEZAVISNI
          ("N1","https://n1info.rs/feed/"),
          ("Nova","https://nova.rs/feed/"),
          ("Danas","https://www.danas.rs/feed/"),
          ("Insajder","https://insajder.net/rss"),
          ("BIRN","https://birn.rs/feed/"),
          ("CINS","https://www.cins.rs/feed/"),
          ("KRIK","https://www.krik.rs/feed/"),
          ("Vreme","https://www.vreme.com/feed/"),

          # EU / UN / INTERNATIONAL
          ("EU Commission","https://ec.europa.eu/commission/presscorner/api/rss"),
          ("EU Serbia","https://europa.rs/feed/"),
          ("Council of Europe","https://www.coe.int/en/web/portal/rss-news"),
          ("OSCE Serbia","https://www.osce.org/rss"),
          ("UN Serbia","https://serbia.un.org/en/rss.xml"),
          ("OHCHR","https://www.ohchr.org/en/rss.xml"),
          ("Human Rights Watch","https://www.hrw.org/rss/news"),
          ("Amnesty","https://www.amnesty.org/en/latest/rss.xml"),

          # FOREIGN MEDIA
          ("Reuters","https://www.reutersagency.com/feed/?best-topics=world&post_type=best"),
          ("BBC Serbian","https://feeds.bbci.co.uk/serbian/rss.xml"),
          ("DW Balkan","https://rss.dw.com/xml/rss-sr-all"),
          ("Al Jazeera Balkans","https://balkans.aljazeera.net/rss.xml")
          ]

          SERBIA_WORDS = [
              "srbija","serbia","serbian","beograd","belgrade",
              "србија","србиј","београд"
          ]

          TOPIC_WORDS = [
              "korup","коруп",
              "izvrš","izvrs","изврш","dug","дуг",
              "plata","plate","zarada","зарада","плата",
              "penzij","пензи",
              "deca","дет","деца",
              "invalid","инвалид",
              "manjin","мањин",
              "diskrimin","дискримин",
              "pritvor","притвор","zatvor","затвор",
              "pravosu","правосу",
              "tender","тендер",
              "javne nabavke","јавне набавке",
              "socijal","социјал",
              "izbor","избор",
              "sloboda","слобода",
              "medij","медиј",
              "human rights",
              "rule of law"
          ]

          def clean_html(text):
              text = re.sub(r"<[^>]+>", " ", text or "")
              text = re.sub(r"\s+", " ", text)
              return text.strip()

          def contains_any(text, words):
              t = text.lower()
              return any(w in t for w in words)

          def parse_date(entry):
              for k in ["published","updated","created"]:
                  v = entry.get(k)
                  if v:
                      try:
                          dt = parsedate_to_datetime(v)
                          if dt.tzinfo is None:
                              dt = dt.replace(tzinfo=timezone.utc)
                          return dt
                      except:
                          pass
              return datetime.now(timezone.utc)

          def detect_category(text):
              t = text.lower()

              if "korup" in t: return "Корупција"
              if "izvrš" in t or "dug" in t: return "Извршења"
              if "plata" in t or "zarada" in t: return "Плате"
              if "penzij" in t: return "Пензионери"
              if "deca" in t or "дет" in t: return "Права деце"
              if "invalid" in t: return "Инвалидитет"
              if "manjin" in t: return "Мањинска права"
              if "pritvor" in t or "zatvor" in t: return "Лишени слободе"
              if "pravosu" in t: return "Правосуђе"
              if "tender" in t: return "Јавне набавке"
              if "izbor" in t: return "Избори"
              return "Људска права"

          now = datetime.now(timezone.utc)
          cutoff = now - timedelta(days=10)

          collected = []
          seen = set()

          for source, url in FEEDS:
              feed = feedparser.parse(url)

              for item in feed.entries:
                  title = item.get("title","").strip()
                  link = item.get("link","").strip()
                  summary = clean_html(item.get("summary",""))

                  if not title or not link:
                      continue
                  if link in seen:
                      continue

                  blob = f"{title} {summary}"

                  if not contains_any(blob,SERBIA_WORDS):
                      continue

                  if not contains_any(blob,TOPIC_WORDS):
                      continue

                  dt = parse_date(item)
                  if dt < cutoff:
                      continue

                  seen.add(link)

                  # EN marker
                  if re.match(r'^[A-Za-z0-9 ,.\'-]+$', title):
                      title = "[EN] " + title

                  collected.append({
                      "id": re.sub(r"[^a-zA-Z0-9]+","-",link)[-60:],
                      "title": title,
                      "url": link,
                      "date": dt.date().isoformat(),
                      "source": source,
                      "category": detect_category(blob),
                      "summary": ""
                  })

          collected.sort(key=lambda x:x["date"], reverse=True)
          collected = collected[:20]

          with open("scanner-data.json","w",encoding="utf-8") as f:
              json.dump({"entries": collected},f,ensure_ascii=False,indent=2)
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scanner-data.json
          git diff --staged --quiet || git commit -m "Update scanner data"
          git push
